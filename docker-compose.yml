volumes:
  uv-cache:
  aws-data:
  azure-data:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/workspace
      - uv-cache:/root/.cache/uv
    working_dir: /workspace
    # SENSIBLE DEFAULTS LAYER
    environment:
      - PYTHONUNBUFFERED=1
      - STORAGE_BACKEND=${STORAGE_BACKEND:-aws}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://minio:9000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}
    command: sleep infinity

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - uv-cache:/root/.cache/uv
    working_dir: /workspace
    environment:
      - STORAGE_BACKEND=${STORAGE_BACKEND:-aws}
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL:-http://minio:9000}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "2718:2718"
    volumes:
      - .:/workspace
      - uv-cache:/root/.cache/uv
    working_dir: /workspace

  # --- STORAGE EMULATORS WITH PROFILES ---
  minio:
    image: minio/minio:latest
    profiles: ["aws"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aws-data:/data
    command: server /data --console-address ":9001"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    profiles: ["azure"]
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azure-data:/data
    # FIX: bypass version tracking guardrails instead of pinning specific versions
    # this is minimal risk for simple read's
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --skipApiVersionCheck
