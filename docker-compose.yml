version: "3.8"

volumes:
  # dedicated volumn to store the uv cache for the whole project including lockfile
  # this enables updating project dependencies inside the dev container
  uv-cache:
  # emulated storage volumes for your cloud provider of choice
  aws-data:
  azure-data:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - .:/workspace
      - uv-cache:/root/.cache/uv
    environment:
      - PYTHONUNBUFFERED=1
      - STORAGE_BACKEND=aws
    working_dir: /workspace
    command: sleep infinity

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
      - uv-cache:/root/.cache/uv
    working_dir: /workspace
    environment:
      - STORAGE_BACKEND=aws

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "2718:2718"
    volumes:
      - .:/workspace
      - uv-cache:/root/.cache/uv
    working_dir: /workspace

  
  # --- STORAGE EMULATOR PROFILES ---
  minio:
    image: minio/minio:latest
    profiles: ["aws"]
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aws-data:/data
    command: server /data --console-address ":9001"

  azurite:
    image: ://microsoft.com
    profiles: ["azure"]
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azure-data:/data