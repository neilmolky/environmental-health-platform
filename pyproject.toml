[project]
name = "environmental-health-platform"
version = "0.1.0"
description = "Cloud-agnostic public health platform"
readme = "README.md"
requires-python = ">=3.13"

[tool.uv]
package = false

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
implicit_reexport = true
namespace_packages = true
explicit_package_bases = true

# Exclude tracking environments entirely
exclude = [
    '^\\.venv/',
    '^backend/\\.venv/',
    '^api/\\.venv/',
    '^frontend/\\.venv/'
]

[tool.uv.workspace]
members = [
    "backend",
    "api",
    "frontend",
]

[dependency-groups]
dev = [
    "mypy>=2.1.0",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "ruff>=0.15.15",
]
