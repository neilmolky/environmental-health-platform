name: Continuous Integration

on:
  push:
    branches: [ "**" ] # Triggers the pipeline on EVERY commit to EVERY branch
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build Packages & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full git history is available for commit message linting

      - name: Set up Astral UV environment
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Define Python environment version
        run: uv python pin 3.13

      - name: Synchronize and verify workspace lockfile
        run: uv sync --frozen

      # Server-Side Guard: Re-verify all commit formats, style guides, and type annotations
      - name: Run Global Code & Commit Message Linters
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --stages commit-msg

      - name: Run Test Suite
        run: |
          uv run pytest backend/ api/ frontend/

  container-security-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the backend image using our optimized Debian Trixie configuration
      - name: Build Backend Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: environmental-health-backend:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Perform the structural security sweep over the compiled image layers
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'environmental-health-backend:test'
          format: 'table'
          exit-code: '1' # Fails the build if CRITICAL or HIGH threats are found
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
