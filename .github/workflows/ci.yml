name: Continuous Integration

on:
  push:
    branches: [ "**" ] # Triggers the pipeline on EVERY commit to EVERY branch
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build Packages & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for tracking Git logs for Conventional Commits

      - name: Set up Astral UV environment
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Define Python environment version
        run: uv python pin 3.13

      - name: Synchronize and verify workspace lockfile
        run: uv sync --frozen --all-packages

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
      
      - name: Run Integration Tests
        env:
          MET_OFFICE_CLIENT_SECRET: ${{ secrets.MET_OFFICE_CLIENT_SECRET }}
        run: |
          uv run pytest -m integration

      - name: Run Test Suite with Coverage
        # TODO: sepperate mocks from integration tests, only run mocks with coverage 
        env:
          MET_OFFICE_CLIENT_SECRET: ${{ secrets.MET_OFFICE_CLIENT_SECRET }}
        run: |
          uv run pytest -m 'not integration' --cov-report=xml

      - name: Generate PR Coverage Comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  container-security-scan:
    name: Container Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Compile image natively using your optimized Debian Trixie single-stage image
      - name: Build Backend Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: environmental-health-backend:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Execute structural safety check over the compiled image layers
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'environmental-health-backend:test'
          format: 'table'
          exit-code: '1' # Fails the build if CRITICAL or HIGH threats are discovered
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
